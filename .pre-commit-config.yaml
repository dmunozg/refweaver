repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff
        args: ["--config=pyproject.toml"]
        files: ^src/
      - id: ruff-format
        args: ["--config=pyproject.toml"]
        files: ^src/
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.351
    hooks:
      - id: pyright
        files: ^src/
        additional_dependencies:
          - "fastapi>=0.115.0"
          - "pydantic>=2.0.0"
          - "sqlalchemy>=2.0.0"
          - "alembic>=1.13.0"
          - "types-requests>=2.32.0"
          - "types-tabulate>=0.9.0"
